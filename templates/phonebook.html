<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Phone Book</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for professional UI Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;       /* Slate 900 */
            --bg-card: #1e293b;       /* Slate 800 */
            --bg-input: #334155;      /* Slate 700 */
            --text-primary: #f8fafc;  /* Slate 50 */
            --text-secondary: #94a3b8;/* Slate 400 */
            --accent-primary: #3b82f6;/* Slate Blue Accent */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--text-primary) !important;
            letter-spacing: 0.5px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-header-title {
            color: var(--text-primary);
            font-weight: 600;
        }

        .form-control, .form-select {
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary) !important;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--bg-input);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .form-select option {
            background-color: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            border: none;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .contact-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .contact-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .badge-category {
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
            font-weight: 600;
        }

        .badge-family { background-color: #ef4444; color: #fff; }
        .badge-work { background-color: #eab308; color: #000; }
        .badge-friends { background-color: #10b981; color: #fff; }
        .badge-general { background-color: #64748b; color: #fff; }

        .search-icon-container {
            position: relative;
        }

        .search-icon-container .fa-search {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-icon-container input {
            padding-left: 38px;
        }

        .contact-count-badge {
            background-color: var(--accent-primary);
            font-size: 0.9rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-dark border-bottom border-secondary border-opacity-25 mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-address-book text-primary me-2"></i> Smart Phone Book
            </span>
            <span class="badge contact-count-badge py-2 px-3">
                Total Contacts: <span id="contact-counter">0</span>
            </span>
        </div>
    </nav>

    <!-- Main Grid Content Area -->
    <div class="container pb-5">
        <div class="row g-4">
            
            <!-- Left Side: Registration Card Form -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="card-header-title mb-4">
                        <i class="fa-solid fa-user-plus me-2 text-primary"></i>Create Contact
                    </h5>
                    
                    <!-- Alert Message Area inside form container -->
                    <div id="alert-container"></div>

                    <form id="contact-form">
                        <div class="mb-3">
                            <label for="input-name" class="form-label text-secondary small">Full Name</label>
                            <input type="text" class="form-control" id="input-name" placeholder="John Doe" required autocomplete="off">
                        </div>

                        <div class="mb-3">
                            <label for="input-phone" class="form-label text-secondary small">Phone Number</label>
                            <input type="tel" class="form-control" id="input-phone" placeholder="e.g. 555-0100" required autocomplete="off">
                        </div>

                        <div class="mb-3">
                            <label for="input-email" class="form-label text-secondary small">Email Address</label>
                            <input type="email" class="form-control" id="input-email" placeholder="john.doe@domain.com" required autocomplete="off">
                        </div>

                        <div class="mb-4">
                            <label for="input-category" class="form-label text-secondary small">Category Group</label>
                            <select class="form-select" id="input-category" required>
                                <option value="" disabled selected>Select a category</option>
                                <option value="Family">Family</option>
                                <option value="Work">Work</option>
                                <option value="Friends">Friends</option>
                                <option value="General">General</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fa-solid fa-paper-plane me-2"></i>Save Contact
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Contact List/Grid Search Interface -->
            <div class="col-lg-8">
                <div class="card p-4 h-100 d-flex flex-column">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                        <h5 class="card-header-title mb-0">
                            <i class="fa-solid fa-users me-2 text-primary"></i>Manage Contacts
                        </h5>
                        
                        <!-- Instant Search Bar -->
                        <div class="search-icon-container flex-grow-1 max-width-search" style="max-width: 320px;">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="search-bar" class="form-control" placeholder="Search contacts...">
                        </div>
                    </div>

                    <!-- Dynamic Contact Card Container -->
                    <div id="contacts-display-grid" class="row row-cols-1 row-cols-md-2 g-3 overflow-auto flex-grow-1" style="max-height: 520px;">
                        <!-- Injected dynamically via script -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap & App AJAX JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('contact-form');
            const searchBar = document.getElementById('search-bar');
            const contactsGrid = document.getElementById('contacts-display-grid');
            const contactCounter = document.getElementById('contact-counter');
            const alertContainer = document.getElementById('alert-container');

            // Secure output escaping helper function to protect against XSS
            function escapeHTML(str) {
                if (!str) return '';
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }

            // Maps database/backend groups to specific CSS dynamic classes
            function getCategoryBadgeClass(category) {
                const lower = category.toLowerCase();
                if (lower === 'family') return 'badge-family';
                if (lower === 'work') return 'badge-work';
                if (lower === 'friends') return 'badge-friends';
                return 'badge-general';
            }

            // Centralized Alert Display inside left card panel
            function showAlert(message, type = 'danger') {
                alertContainer.innerHTML = `
                    <div class="alert alert-${type} alert-dismissible fade show border-0" role="alert">
                        <i class="fa-solid ${type === 'danger' ? 'fa-triangle-exclamation' : 'fa-circle-check'} me-2"></i>
                        ${escapeHTML(message)}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            }

            // Load and render contacts dynamically via internal API
            async function loadContacts(query = '') {
                try {
                    const response = await fetch(`/api/contacts?q=${encodeURIComponent(query)}`);
                    if (!response.ok) throw new Error("Failed to retrieve system database.");
                    const contacts = await response.json();
                    
                    renderContactGrid(contacts);
                } catch (error) {
                    console.error("API error: ", error);
                }
            }

            // Update total active contact badge count
            async function updateCount() {
                try {
                    const response = await fetch('/api/contacts');
                    const contacts = await response.json();
                    contactCounter.textContent = contacts.length;
                } catch (err) {
                    console.error("Error setting stats: ", err);
                }
            }

            // Write HTML blocks into right grid container with interactive controls
            function renderContactGrid(contacts) {
                contactsGrid.innerHTML = '';
                
                if (contacts.length === 0) {
                    contactsGrid.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="fa-regular fa-folder-open fa-3x text-secondary mb-3"></i>
                            <p class="text-secondary">No matching contacts found.</p>
                        </div>
                    `;
                    return;
                }

                contacts.forEach(contact => {
                    const categoryClass = getCategoryBadgeClass(contact.category);
                    const escapedPhone = escapeHTML(contact.phone);

                    const card = document.createElement('div');
                    card.className = 'col';
                    card.innerHTML = `
                        <div class="contact-card p-3 h-100 d-flex flex-column justify-content-between">
                            <div>
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="mb-0 text-truncate fw-semibold" style="max-width: 140px;" title="${escapeHTML(contact.name)}">
                                        ${escapeHTML(contact.name)}
                                    </h6>
                                    <span class="badge ${categoryClass} badge-category">${escapeHTML(contact.category)}</span>
                                </div>
                                <div class="small text-secondary mb-1">
                                    <i class="fa-solid fa-phone me-2 text-primary" style="font-size: 0.8rem;"></i>${escapedPhone}
                                </div>
                                <div class="small text-secondary text-truncate" title="${escapeHTML(contact.email)}">
                                    <i class="fa-solid fa-envelope me-2 text-primary" style="font-size: 0.8rem;"></i>${escapeHTML(contact.email)}
                                </div>
                            </div>
                            <div class="text-end mt-3 border-top border-secondary border-opacity-10 pt-2">
                                <button class="btn btn-sm btn-outline-danger border-0 btn-delete" data-phone="${escapedPhone}">
                                    <i class="fa-solid fa-trash-can me-1"></i>Delete
                                </button>
                            </div>
                        </div>
                    `;
                    contactsGrid.appendChild(card);
                });

                // Attach functional behavior programmatically to new elements
                document.querySelectorAll('.btn-delete').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const targetPhone = e.currentTarget.getAttribute('data-phone');
                        deleteContact(targetPhone);
                    });
                });
            }

            // Event listener processing database submission transactions
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertContainer.innerHTML = ''; // Reset alert box
                
                const payload = {
                    name: document.getElementById('input-name').value,
                    phone: document.getElementById('input-phone').value,
                    email: document.getElementById('input-email').value,
                    category: document.getElementById('input-category').value
                };

                try {
                    const response = await fetch('/api/contacts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        showAlert(result.message, 'success');
                        contactForm.reset();
                        loadContacts();
                        updateCount();
                    } else {
                        showAlert(result.error || 'Server processing error occurred.', 'danger');
                    }
                } catch (err) {
                    showAlert('Error communicating with backend application.', 'danger');
                }
            });

            // Delete processing method execution block
            async function deleteContact(phone) {
                try {
                    const response = await fetch(`/api/contacts/${encodeURIComponent(phone)}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();
                    
                    if (response.ok && result.success) {
                        loadContacts(searchBar.value);
                        updateCount();
                    } else {
                        showAlert(result.error || 'Failed to delete contact.', 'danger');
                    }
                } catch (err) {
                    showAlert('Error dispatching deletion process to server.', 'danger');
                }
            }

            // Real-time Search Event Listener
            searchBar.addEventListener('input', (e) => {
                loadContacts(e.target.value);
            });

            // Initial startup load triggers
            loadContacts();
            updateCount();
        });
    </script>
</body>
</html>
