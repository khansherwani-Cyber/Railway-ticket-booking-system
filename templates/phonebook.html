<!DOCTYPE html>
<!--
  Smart Phone Book — Frontend Interface
  University OOP Project | Flask + HTML/CSS/JS
  File: templates/phonebook.html
  
  Communication: All data is exchanged with the Flask backend
  via AJAX (fetch API) — no page reloads needed.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Phone Book</title>

  <!-- Bootstrap 5 for grid and base utilities -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Font: Inter (clean, modern, professional) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =========================================================
       DESIGN TOKENS — single source of truth for all colors
       ========================================================= */
    :root {
      --bg-base:       #0d1117;   /* deepest background */
      --bg-card:       #161b22;   /* card surfaces */
      --bg-input:      #1c2333;   /* form inputs */
      --bg-row:        #1c2333;   /* contact row background */
      --bg-row-hover:  #21262d;   /* row hover state */
      --border:        #30363d;   /* subtle borders */
      --accent:        #58a6ff;   /* primary blue accent (GitHub-inspired) */
      --accent-soft:   #1f3a5f;   /* muted accent for badges */
      --danger:        #f85149;   /* delete / error */
      --danger-soft:   #3d1f1f;   /* muted danger for backgrounds */
      --success:       #3fb950;   /* success green */
      --success-soft:  #1a3326;   /* muted success */
      --text-primary:  #e6edf3;   /* main text */
      --text-secondary:#8b949e;   /* muted labels */
      --text-dim:      #484f58;   /* very faint text */
      --radius:        10px;
      --radius-sm:     6px;
    }

    /* =========================================================
       BASE RESET & BODY
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* =========================================================
       TOP NAVIGATION BAR
       ========================================================= */
    .top-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .top-bar .brand .icon-wrap {
      background: var(--accent);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .counter-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .counter-badge .count-num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* =========================================================
       MAIN LAYOUT
       ========================================================= */
    .main-wrap {
      max-width: 1300px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .main-wrap { grid-template-columns: 1fr; }
    }

    /* =========================================================
       CARD COMPONENT (shared by both panels)
       ========================================================= */
    .card-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    /* =========================================================
       ADD CONTACT FORM (LEFT PANEL)
       ========================================================= */
    .form-wrap { padding: 20px; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-control, .form-select {
      width: 100%;
      background: var(--bg-input) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-sm) !important;
      color: var(--text-primary) !important;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      padding: 10px 13px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-control::placeholder { color: var(--text-dim) !important; }

    .form-control:focus, .form-select:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12) !important;
    }

    .form-select option { background: var(--bg-input); color: var(--text-primary); }

    /* Submit button */
    .btn-add {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
      margin-top: 6px;
    }

    .btn-add:hover  { background: #1f6feb; }
    .btn-add:active { transform: scale(0.98); }

    /* Toast / inline alert */
    .form-toast {
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 0.82rem;
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .form-toast.success { background: var(--success-soft); color: var(--success); display: flex; }
    .form-toast.error   { background: var(--danger-soft);  color: var(--danger);  display: flex; }

    /* =========================================================
       CONTACTS PANEL (RIGHT PANEL)
       ========================================================= */
    .search-wrap {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .search-wrap .bi-search {
      position: absolute;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    #searchInput {
      padding-left: 34px !important;
    }

    /* Contact grid */
    .contacts-grid {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 300px;
      max-height: 72vh;
      overflow-y: auto;
    }

    /* Custom scrollbar for the contacts grid */
    .contacts-grid::-webkit-scrollbar       { width: 5px; }
    .contacts-grid::-webkit-scrollbar-track { background: transparent; }
    .contacts-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Single contact row */
    .contact-row {
      background: var(--bg-row);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 13px;
      transition: background 0.12s, border-color 0.12s;
      animation: fadeIn 0.2s ease;
    }

    .contact-row:hover { background: var(--bg-row-hover); border-color: #444c56; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar circle — colored by category */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .avatar.Family  { background: #1a3a5c; color: #58a6ff; }
    .avatar.Work    { background: #2a1f3d; color: #bc8cff; }
    .avatar.Friends { background: #1a3326; color: #3fb950; }
    .avatar.General { background: #2d2415; color: #e3b341; }

    /* Contact info */
    .contact-info { flex: 1; min-width: 0; }

    .contact-info .c-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-info .c-phone {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .contact-info .c-email {
      font-size: 0.76rem;
      color: var(--text-dim);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Category badge */
    .cat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 12px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .cat-badge.Family  { background: #1a3a5c; color: #58a6ff; }
    .cat-badge.Work    { background: #2a1f3d; color: #bc8cff; }
    .cat-badge.Friends { background: #1a3326; color: #3fb950; }
    .cat-badge.General { background: #2d2415; color: #e3b341; }

    /* Delete button */
    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: var(--radius-sm);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn-delete:hover {
      background: var(--danger-soft);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* =========================================================
       STATS ROW (below search in right panel)
       ========================================================= */
    .stats-bar {
      padding: 9px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 18px;
    }

    .stat-item {
      font-size: 0.77rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-item span { color: var(--text-secondary); font-weight: 500; }
  </style>
</head>

<body>

  <!-- ===================== TOP NAV BAR ===================== -->
  <div class="top-bar">
    <div class="brand">
      <div class="icon-wrap"><i class="bi bi-journal-bookmark-fill"></i></div>
      Smart Phone Book
    </div>
    <div class="counter-badge">
      <i class="bi bi-people-fill" style="color: var(--accent);"></i>
      <span class="count-num" id="totalCount">0</span>
      <span>contacts</span>
    </div>
  </div>

  <!-- ===================== MAIN GRID LAYOUT ===================== -->
  <div class="main-wrap">

    <!-- ===== LEFT PANEL: Add Contact Form ===== -->
    <div class="card-panel">
      <div class="panel-header">
        <h2><i class="bi bi-person-plus me-2"></i>Add Contact</h2>
      </div>
      <div class="form-wrap">

        <div class="form-group">
          <label for="inputName">Full Name</label>
          <input type="text" id="inputName" class="form-control"
                 placeholder="e.g. Ali Hassan" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="inputPhone">Phone Number</label>
          <input type="text" id="inputPhone" class="form-control"
                 placeholder="e.g. +92 300 1234567" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="inputEmail">Email Address</label>
          <input type="email" id="inputEmail" class="form-control"
                 placeholder="e.g. ali@gmail.com" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="inputCategory">Category</label>
          <select id="inputCategory" class="form-select">
            <option value="">— Select Category —</option>
            <option value="Family">Family</option>
            <option value="Work">Work</option>
            <option value="Friends">Friends</option>
            <option value="General">General</option>
          </select>
        </div>

        <button class="btn-add" onclick="addContact()">
          <i class="bi bi-plus-circle"></i> Save Contact
        </button>

        <!-- Inline feedback toast -->
        <div class="form-toast" id="formToast">
          <i class="bi" id="toastIcon"></i>
          <span id="toastMsg"></span>
        </div>

      </div>
    </div>

    <!-- ===== RIGHT PANEL: Contact List ===== -->
    <div class="card-panel">

      <div class="panel-header">
        <h2><i class="bi bi-card-list me-2"></i>All Contacts</h2>
      </div>

      <!-- Search Bar -->
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" class="form-control"
               placeholder="Search by name, phone, email, or category…"
               oninput="searchContacts()" autocomplete="off" />
      </div>

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stat-item"><i class="bi bi-filter"></i> Showing <span id="showingCount">0</span> results</div>
      </div>

      <!-- Dynamic Contact Rows -->
      <div class="contacts-grid" id="contactsGrid">
        <!-- Populated by JS -->
      </div>

    </div>
  </div><!-- /main-wrap -->


  <!-- ===================== JAVASCRIPT =====================
       All API calls use the Fetch API (AJAX).
       No page reloads — everything updates in place.
  ============================================================ -->
  <script>
    // -------------------------------------------------------
    // XSS PROTECTION: Escape any special HTML characters
    // before injecting user data into the DOM.
    // -------------------------------------------------------
    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // -------------------------------------------------------
    // Get the first letter of a name for the avatar circle
    // -------------------------------------------------------
    function getInitial(name) {
      return escapeHtml(name.trim().charAt(0).toUpperCase() || '?');
    }

    // -------------------------------------------------------
    // Render a list of contact objects into the grid
    // -------------------------------------------------------
    function renderContacts(contacts) {
      const grid         = document.getElementById('contactsGrid');
      const showingCount = document.getElementById('showingCount');

      showingCount.textContent = contacts.length;

      if (contacts.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-search"></i>
            No contacts found. Try a different search or add a new one.
          </div>`;
        return;
      }

      // Build HTML for all contact rows
      grid.innerHTML = contacts.map(c => `
        <div class="contact-row" id="row-${escapeHtml(c.phone).replace(/\s/g,'_')}">
          <div class="avatar ${escapeHtml(c.category)}">${getInitial(c.name)}</div>
          <div class="contact-info">
            <div class="c-name">${escapeHtml(c.name)}</div>
            <div class="c-phone"><i class="bi bi-telephone" style="font-size:.7rem;margin-right:4px;"></i>${escapeHtml(c.phone)}</div>
            <div class="c-email"><i class="bi bi-envelope" style="font-size:.7rem;margin-right:4px;"></i>${escapeHtml(c.email)}</div>
          </div>
          <span class="cat-badge ${escapeHtml(c.category)}">${escapeHtml(c.category)}</span>
          <button class="btn-delete" title="Delete contact"
                  onclick="deleteContact('${escapeHtml(c.phone)}')">
            <i class="bi bi-trash3"></i>
          </button>
        </div>
      `).join('');
    }

    // -------------------------------------------------------
    // Update the total count badge in the top nav
    // -------------------------------------------------------
    function updateCounter(count) {
      document.getElementById('totalCount').textContent = count;
    }

    // -------------------------------------------------------
    // Show inline feedback toast under the form
    // -------------------------------------------------------
    function showToast(message, type = 'success') {
      const toast   = document.getElementById('formToast');
      const iconEl  = document.getElementById('toastIcon');
      const msgEl   = document.getElementById('toastMsg');

      toast.className = `form-toast ${type}`;
      iconEl.className = `bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'}`;
      msgEl.textContent = message;

      // Auto-hide after 4 seconds
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    // -------------------------------------------------------
    // LOAD ALL CONTACTS on page load
    // -------------------------------------------------------
    async function loadContacts() {
      try {
        const res  = await fetch('/api/contacts');
        const data = await res.json();
        renderContacts(data.contacts);
        updateCounter(data.count);
      } catch (err) {
        console.error('Failed to load contacts:', err);
      }
    }

    // -------------------------------------------------------
    // REAL-TIME SEARCH — fires on every keystroke
    // -------------------------------------------------------
    async function searchContacts() {
      const query = document.getElementById('searchInput').value;
      try {
        const res  = await fetch(`/api/contacts/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderContacts(data.contacts);
        // Don't update the top counter during search — keep it as total
      } catch (err) {
        console.error('Search failed:', err);
      }
    }

    // -------------------------------------------------------
    // ADD CONTACT — reads form, POSTs to backend
    // -------------------------------------------------------
    async function addContact() {
      const name     = document.getElementById('inputName').value.trim();
      const phone    = document.getElementById('inputPhone').value.trim();
      const email    = document.getElementById('inputEmail').value.trim();
      const category = document.getElementById('inputCategory').value;

      try {
        const res  = await fetch('/api/contacts/add', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, phone, email, category })
        });
        const data = await res.json();

        if (data.success) {
          showToast(data.message, 'success');
          // Clear the form
          ['inputName','inputPhone','inputEmail'].forEach(id => document.getElementById(id).value = '');
          document.getElementById('inputCategory').value = '';
          // Reload contacts and update counter
          await loadContacts();
        } else {
          showToast(data.error, 'error');
        }
      } catch (err) {
        showToast('Network error. Is the server running?', 'error');
      }
    }

    // -------------------------------------------------------
    // DELETE CONTACT — sends phone number to backend
    // -------------------------------------------------------
    async function deleteContact(phone) {
      if (!confirm(`Delete this contact?`)) return;

      try {
        const res  = await fetch('/api/contacts/delete', {
          method:  'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ phone })
        });
        const data = await res.json();

        if (data.success) {
          updateCounter(data.count);
          // Re-run current search (so filtered view refreshes correctly)
          searchContacts();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Delete failed. Check the server.');
      }
    }

    // -------------------------------------------------------
    // Allow pressing Enter in the form to submit
    // -------------------------------------------------------
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement.closest('.form-wrap')) {
        addContact();
      }
    });

    // -------------------------------------------------------
    // Bootstrap: load all contacts when page is ready
    // -------------------------------------------------------
    document.addEventListener('DOMContentLoaded', loadContacts);
  </script>

</body>
</html>
